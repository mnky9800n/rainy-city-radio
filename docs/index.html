<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <title>99X — Rainy-City Radio</title>
  <link rel="icon" href="static.jpg">
  <meta property="og:title" content="99X — Rainy-City Radio">
  <meta property="og:description" content="A queer kung-fu DJ named Jennifer who refuses to stop talking about pizza.">
  <meta property="og:image" content="static.jpg">
  <meta name="description" content="A queer kung-fu DJ named Jennifer who refuses to stop talking about pizza.">
  <style>
    /* Designed for RCTV — vertical TV (~9:16) viewed from ~10 ft.
       Reads on phones too; vw/vh sizing scales gracefully. */
    :root {
      --bg: #0a0a14;
      --fg: #f6f4ee;
      --accent: #ffc7a8;
      --qr-bg: #f6f4ee;
      --qr-fg: #0a0a14;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh; min-height: 100dvh;
      background: var(--bg); color: var(--fg);
      font-family: "Georgia", "Times New Roman", serif;
      overflow: hidden;
    }
    /* Background art — `static.jpg` is portrait (714×1280), matches
       vertical TV natively. Dimmed so foreground reads. */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: url("static.jpg") center/cover no-repeat #0a0a14;
      opacity: 0.55;
      filter: brightness(0.45) saturate(1.1);
      z-index: 0;
    }
    /* Vignette to keep edges readable when text overlays the art */
    body::after {
      content: "";
      position: fixed; inset: 0;
      background:
        linear-gradient(180deg, rgba(10,10,20,0.85) 0%, rgba(10,10,20,0.30) 30%, rgba(10,10,20,0.30) 65%, rgba(10,10,20,0.85) 100%);
      z-index: 0;
      pointer-events: none;
    }
    main {
      position: relative;
      z-index: 1;
      width: 100%; height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 6vh 5vw;
      gap: 4vh;
    }
    /* HEADER */
    header { text-align: center; }
    h1 {
      font-size: clamp(48px, 14vh, 220px);
      margin: 0;
      letter-spacing: -0.04em;
      line-height: 0.9;
      text-shadow: 0 0.4vh 1.2vh rgba(0,0,0,0.6);
    }
    .freq {
      font-size: clamp(16px, 3.4vh, 48px);
      letter-spacing: 0.12em;
      opacity: 0.78;
      margin-top: 1.2vh;
      font-variant: small-caps;
    }
    /* QR — must be readable from 6-15 ft. */
    .qr-wrap {
      align-self: center; justify-self: center;
      background: var(--qr-bg);
      padding: 3vh;
      border-radius: 1.8vh;
      width: clamp(220px, 60vmin, 720px);
      aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1.5vh 4vh rgba(0,0,0,0.45);
    }
    .qr-wrap svg, .qr-wrap canvas {
      width: 100%; height: 100%; display: block;
    }
    /* FOOTER */
    footer { text-align: center; }
    .tagline {
      font-size: clamp(16px, 3.4vh, 44px);
      line-height: 1.3;
      font-style: italic;
      opacity: 0.96;
      max-width: 22ch;
      margin: 0 auto;
      text-wrap: balance;
      text-shadow: 0 0.3vh 1vh rgba(0,0,0,0.7);
    }
    .cta {
      font-size: clamp(20px, 4.2vh, 56px);
      margin-top: 3vh;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-variant: small-caps;
      text-shadow: 0 0.3vh 1vh rgba(0,0,0,0.7);
    }
    /* Phone fallback — still works if someone visits on their phone */
    @media (max-aspect-ratio: 9 / 16) {
      main { padding: 4vh 4vw; gap: 2vh; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>99X</h1>
      <div class="freq">99.7 FM · Rainy-City Radio</div>
    </header>

    <div class="qr-wrap" id="qr" aria-label="Scan to listen live"></div>

    <footer>
      <p class="tagline">A queer kung-fu DJ named Jennifer who refuses to stop talking about pizza.</p>
      <div class="cta">scan to listen →</div>
    </footer>
  </main>

  <!-- qrcode-generator: small, no-dep, MIT-licensed, renders SVG. -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    // EDIT THIS LINE to point at your live URL. YouTube's /@<handle>/live
    // auto-redirects to whatever's currently broadcasting on the channel,
    // so the QR survives stream restarts without re-generating.
    const TARGET_URL = "https://www.youtube.com/@rainy-city-radio/live";

    const qr = qrcode(0, "M"); // type=0 auto-size, error correction Medium
    qr.addData(TARGET_URL);
    qr.make();
    // createSvgTag gives us a clean inline SVG with crisp modules.
    document.getElementById("qr").innerHTML =
      qr.createSvgTag({ cellSize: 4, margin: 0, scalable: true });

    // Force the SVG to fill its container regardless of cellSize.
    const svg = document.querySelector("#qr svg");
    if (svg) {
      svg.removeAttribute("width");
      svg.removeAttribute("height");
      svg.style.width = "100%";
      svg.style.height = "100%";
    }
  </script>
</body>
</html>
